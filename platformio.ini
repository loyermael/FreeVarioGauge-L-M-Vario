[platformio]
src_dir = src/FreeVarioGaugeMerged
data_dir = src/FreeVarioGaugeMerged/data

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = spiffs

build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
  ; Pins VSPI - matching user wiring
  -D TFT_MISO=19
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=22
  -D TFT_RST=21
  -D SPI_FREQUENCY=27000000
  -D SPI_READ_FREQUENCY=20000000

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.31
  mikalhart/Streaming @ ^1.0.0
  madhephaestus/ESP32Encoder @ ^0.10.2

